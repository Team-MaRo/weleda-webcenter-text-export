documentation:
  - changed-files:
    - any-glob-to-any-file:
        - '**/*.md'
        - 'AGENTS.md'

feature:
  - head-branch: ['^feature', 'feature']

release:
  - all:
    - base-branch: 'master'
    - head-branch: ['^release', 'release']

docker:
  - changed-files:
    - any-glob-to-any-file:
        - '.docker/**/*'
        - '.dockerignore'
        - 'Dockerfile'
        - 'compose.yml'
        - 'compose.vm.yml.dist'

vagrant:
  - changed-files:
    - any-glob-to-any-file:
        - 'Vagrantfile'
        - '.vagrant.config.yml.dist'
        - 'compose.vm.yml.dist'

devcontainer:
  - changed-files:
    - any-glob-to-any-file:
        - '.devcontainer/**/*'

source:
  - all:
    - changed-files:
      - any-glob-to-any-file:
          - 'app/**/*'
          - 'public/**/*'
      - all-globs-to-all-files: '!app/**/*.test.{ts,tsx}'

test:
  - changed-files:
    - any-glob-to-any-file: 'app/**/*.test.{ts,tsx}'
