name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress and the latest queued run. Don't cancel in-progress runs —
# production deployments should complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm ci

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Authoritative source for the deployed hostname. Vite's sitemap +
      # robots plugins read SITE_HOST; fail fast if Settings → Pages →
      # Custom domain isn't configured rather than silently shipping a
      # sitemap pointing at localhost.
      - name: Read Pages custom domain
        id: pages_cname
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CNAME=$(gh api "repos/${{ github.repository }}/pages" --jq '.cname')
          if [ -z "$CNAME" ] || [ "$CNAME" = "null" ]; then
            echo "::error::Pages API returned no custom domain. Set one in Settings → Pages → Custom domain."
            exit 1
          fi
          echo "site_host=$CNAME" >> "$GITHUB_OUTPUT"

      - name: Build (SPA / static)
        run: pnpm run build
        env:
          SSR: 'false'
          SITE_HOST: ${{ steps.pages_cname.outputs.site_host }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
