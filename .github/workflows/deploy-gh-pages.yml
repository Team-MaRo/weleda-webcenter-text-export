name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress and the latest queued run. Don't cancel in-progress runs —
# production deployments should complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm ci

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Resolve the deployed host + base path from the Pages API. Vite's `base`
      # and the sitemap/robots plugins read SITE_HOST / BASE_PATH. A custom
      # domain serves at the root; without one, Pages serves the project at
      # https://<owner>.github.io/<repo>/, so derive the sub-path from html_url
      # rather than failing on a null cname.
      - name: Read Pages URL
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PAGES=$(gh api "repos/${{ github.repository }}/pages")
          CNAME=$(echo "$PAGES" | jq -r '.cname // ""')
          HTML_URL=$(echo "$PAGES" | jq -r '.html_url')
          if [ -n "$CNAME" ] && [ "$CNAME" != "null" ]; then
            SITE_HOST="$CNAME"
            BASE_PATH="/"
          else
            tmp="${HTML_URL#*://}"
            SITE_HOST="${tmp%%/*}"
            BASE_PATH="${tmp#"$SITE_HOST"}"
            [ -z "$BASE_PATH" ] && BASE_PATH="/"
            case "$BASE_PATH" in /*) ;; *) BASE_PATH="/$BASE_PATH" ;; esac
            case "$BASE_PATH" in */) ;; *) BASE_PATH="$BASE_PATH/" ;; esac
          fi
          echo "site_host=$SITE_HOST" >> "$GITHUB_OUTPUT"
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved SITE_HOST=$SITE_HOST BASE_PATH=$BASE_PATH"

      - name: Build (SPA / static)
        run: pnpm run build
        env:
          SSR: 'false'
          SITE_HOST: ${{ steps.pages.outputs.site_host }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
