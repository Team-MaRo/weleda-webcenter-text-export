allowBuilds:
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  esbuild: true

# `@iwf-web/tsconfig/react-strict/tsconfig.json` extends three @tsconfig/*
# bases. tsc follows the @iwf-web/tsconfig symlink and resolves them inside
# the .pnpm subtree, but typescript-eslint's parser resolves against the
# symlink path and can't see them there. Public-hoisting them puts a
# top-level symlink in node_modules/@tsconfig/* so both resolvers agree.
publicHoistPattern:
  - "@tsconfig/*"
