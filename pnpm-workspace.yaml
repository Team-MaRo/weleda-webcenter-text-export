allowBuilds:
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  esbuild: true
  sharp: true
  # workerd ships prebuilt binaries; its postinstall isn't required for
  # `wrangler types` / `react-router build` (the CF SSR target builds fine
  # without it), so leave it unbuilt to keep installs lean. Flip to true only
  # if local `wrangler dev`/`deploy` need the build step.
  workerd: false

minimumReleaseAgeExclude:
  - sass@1.100.0
  - '@cloudflare/vite-plugin@1.39.2'
  - miniflare@4.20260601.0
  - wrangler@4.97.0
  - i18next@26.3.1

# Force transitive js-yaml >= 4.1.1 (prototype-pollution fix, GHSA in 4.1.0
# pulled in by @modyfi/vite-plugin-yaml 1.1.1). Drop this once that plugin
# ships a release on the patched version.
overrides:
  js-yaml: '>=4.1.1'

# `@iwf-web/tsconfig/react-strict/tsconfig.json` extends three @tsconfig/*
# bases. tsc follows the @iwf-web/tsconfig symlink and resolves them inside
# the .pnpm subtree, but typescript-eslint's parser resolves against the
# symlink path and can't see them there. Public-hoisting them puts a
# top-level symlink in node_modules/@tsconfig/* so both resolvers agree.
publicHoistPattern:
  - "@tsconfig/*"
